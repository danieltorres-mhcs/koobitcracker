<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koobits Cracker</title>

<style>
*{
    box-sizing:border-box;
    font-family:system-ui,sans-serif;
}

body{
    margin:24px;
    height:100vh;
    overflow:hidden;
    background:#f3f3f3;
    background-size:80px 80px;
    transition:.25s;
}
h1{
    margin:0 0 18px;
    text-align:center;
}

#link{
    display:block;
    text-align:center;
    margin-bottom:20px;
    word-break:break-all;
    color:#1565c0;
    text-decoration:none;
    font-weight:bold;
}

#link.disabled{
    color:#888;
    pointer-events:none;
}
#info{
    margin:12px 0 20px;
    font-size:14px;
    opacity:.8;
}
#thumbnailLabel{
    margin:12px 0 8px;
    font-weight:600;
}

#thumbnail{
    width:220px;
    max-width:100%;
    display:none;
    margin:0 0 18px;
}

#thumbnail:not(.hidden){
    display:block;
    padding:10px;
    background:rgba(255,255,255,.15);
    border-radius:12px;
}

.hidden{
    display:none;
}
label{
    display:block;
    margin:14px 0 6px;
    font-weight:600;
}

select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #bbb;
    font-size:16px;
}
.credit-link {
    color: #333;
    text-decoration: none;
}
</style>
</head>

<body>

<h1>Koobit Cracker</h1>

<a id="link" class="disabled" target="_blank">
Select a type and game
</a>

<label>Type</label>

<select id="type">
<option value="">Choose...</option>
<option value="memory">Memory</option>
<option value="flexibility">Flexibility</option>
<option value="speed">Speed</option>
<option value="attention">Attention</option>
<option value="problemsolving">Problem Solving</option>
<option value="adventure">Adventure</option>
</select>

<label>Game</label>

<select id="game">
<option value="">Choose a type first...</option>
</select>

<p id="thumbnailLabel" class="hidden">Game Thumbnail:</p>
<img id="thumbnail" class="hidden" alt="Game thumbnail">

<p id="info">
Click the link above or click the game thumbnail to open the selected game in another tab.<br>

const type=document.getElementById("type");
const game=document.getElementById("game");
const link=document.getElementById("link");
const thumbnail = document.getElementById("thumbnail");
const thumbnailLabel = document.getElementById("thumbnailLabel");
function updateGames(){

game.innerHTML="<option value=''>Choose...</option>";

const t=type.value;
const c = colors[t || "default"];

document.body.style.backgroundImage = `url(${backgrounds[t || "default"]})`;
document.body.style.color = c.text;
link.style.color = link.classList.contains("disabled") ? c.hint : c.link;

if(!t){
document.body.style.backgroundImage = `url(${backgrounds.default})`;
updateLink();
return;
}

for(const [name,id] of Object.entries(categories[t].games)){
const option=document.createElement("option");
option.textContent=name;
option.value=id;
game.appendChild(option);
}

document.body.style.backgroundImage=`url(${backgrounds[t]||""})`;

updateLink();

}

function updateLink() {
thumbnail.classList.add("hidden");
thumbnailLabel.classList.add("hidden");
thumbnail.removeAttribute("src");
    const t = type.value;
    const g = game.value;
    const c = colors[t || "default"];

if (!t || !g) {
    link.textContent = "Select a type and game";
    link.removeAttribute("href");
    link.classList.add("disabled");
    link.style.color = c.hint;

    thumbnail.classList.add("hidden");
    thumbnailLabel.classList.add("hidden");
    thumbnail.addEventListener("click", () => {
    if (link.href) {
        window.open(link.href, "_blank");
    }
});
    return;
}

const url = `https://braingames.koobits.com/brain_games/${categories[t].prefix}${g}`;

link.textContent = url;
link.href = url;
link.classList.remove("disabled");
link.style.color = c.link;

thumbnail.src = `https://braingames.koobits.com/thumbnails/${categories[t].prefix}${g}.png`;

thumbnail.classList.remove("hidden");
thumbnailLabel.classList.remove("hidden");
}
type.addEventListener("change",updateGames);
game.addEventListener("change",updateLink);
document.body.style.backgroundImage = `url(${backgrounds.default})`;

updateGames();
</script>
